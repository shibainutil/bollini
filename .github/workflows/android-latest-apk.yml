name: Android Latest APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-latest-apk
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Validate required Firebase secrets
        run: |
          missing=0
          for key in \
            EXPO_PUBLIC_FIREBASE_API_KEY \
            EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN \
            EXPO_PUBLIC_FIREBASE_PROJECT_ID \
            EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET \
            EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID \
            EXPO_PUBLIC_FIREBASE_APP_ID
          do
            if [ -z "$(printenv "$key")" ]; then
              echo "Missing repository secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Write Expo environment file
        run: |
          cat <<EOF > .env
          EXPO_PUBLIC_FIREBASE_API_KEY=$EXPO_PUBLIC_FIREBASE_API_KEY
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=$EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=$EXPO_PUBLIC_FIREBASE_PROJECT_ID
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=$EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
          EXPO_PUBLIC_FIREBASE_APP_ID=$EXPO_PUBLIC_FIREBASE_APP_ID
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=$EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID
          EOF

      - name: Build Android release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Prepare release asset
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/bollini-latest.apk

      - name: Upload APK build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bollini-latest-apk
          path: dist/bollini-latest.apk
          if-no-files-found: error

      - name: Publish rolling APK release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Android Latest
          body: Automatically updated APK build from the latest main branch commit.
          prerelease: true
          make_latest: false
          files: dist/bollini-latest.apk
          overwrite_files: true
